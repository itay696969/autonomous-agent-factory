name: Factory Swarm Orchestrator

on:
  repository_dispatch:
    types: [linear-ready-for-dev]

jobs:
  swarm_execution:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Swarm Orchestrator with Langfuse Telemetry
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: "https://cloud.langfuse.com"
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "Tracing swarm execution via Langfuse..."
          node --require ./swarm/telemetry.js swarm/orchestrator.js
